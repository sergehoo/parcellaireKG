{% extends "account/base_auth.html" %}

{% block head_title %}Mot de passe modifié{% endblock %}

{% block content %}
<div class="text-center">
    <div class="mx-auto grid h-20 w-20 place-items-center rounded-[24px] bg-emerald-100 text-emerald-700">
        <i class="fa-solid fa-shield-check text-2xl"></i>
    </div>

    <p class="mt-6 text-xs font-bold uppercase tracking-[0.22em] text-premium-600">Sécurité mise à jour</p>
    <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Mot de passe modifié</h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">
        Votre mot de passe a été mis à jour avec succès. Vous pouvez maintenant vous connecter.
    </p>
</div>

<div class="mt-8">
    <a href="{% url 'account_login' %}" class="btn-primary">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Se connecter</span>
    </a>
</div>
{% endblock %}
