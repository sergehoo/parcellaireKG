{% extends "account/base_auth.html" %}

{% block head_title %}E-mail confirmé{% endblock %}

{% block content %}
<div class="text-center">
    <div class="mx-auto grid h-20 w-20 place-items-center rounded-[24px] bg-emerald-100 text-emerald-700">
        <i class="fa-solid fa-circle-check text-2xl"></i>
    </div>

    <p class="mt-6 text-xs font-bold uppercase tracking-[0.22em] text-premium-600">Confirmation réussie</p>
    <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Adresse e-mail confirmée</h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">
        Votre adresse e-mail a bien été confirmée. Vous pouvez maintenant accéder à votre espace.
    </p>
</div>

<div class="mt-8">
    <a href="{% url 'account_login' %}" class="btn-primary">
        <i class="fa-solid fa-right-to-bracket"></i>
        <span>Se connecter</span>
    </a>
</div>
{% endblock %}
