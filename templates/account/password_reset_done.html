{% extends "account/base_auth.html" %}

{% block head_title %}E-mail envoyé{% endblock %}

{% block content %}
<div class="text-center">
    <div class="mx-auto grid h-20 w-20 place-items-center rounded-[24px] bg-emerald-100 text-emerald-700">
        <i class="fa-solid fa-envelope-circle-check text-2xl"></i>
    </div>

    <p class="mt-6 text-xs font-bold uppercase tracking-[0.22em] text-premium-600">Notification envoyée</p>
    <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Consultez votre boîte mail</h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">
        Si un compte existe avec cette adresse, un e-mail de réinitialisation vient d’être envoyé.
    </p>
</div>

<div class="mt-8">
    <a href="{% url 'account_login' %}" class="btn-secondary">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Retour à la connexion</span>
    </a>
</div>
{% endblock %}
