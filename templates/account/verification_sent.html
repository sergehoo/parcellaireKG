{% extends "account/base_auth.html" %}

{% block head_title %}Vérification envoyée{% endblock %}

{% block content %}
<div class="text-center">
    <div class="mx-auto grid h-20 w-20 place-items-center rounded-[24px] bg-amber-100 text-amber-700">
        <i class="fa-solid fa-paper-plane text-2xl"></i>
    </div>

    <p class="mt-6 text-xs font-bold uppercase tracking-[0.22em] text-premium-600">E-mail envoyé</p>
    <h2 class="mt-2 text-3xl font-black tracking-tight text-slate-900">Vérification en attente</h2>
    <p class="mt-3 text-sm leading-6 text-slate-500">
        Un e-mail de confirmation vous a été envoyé. Veuillez consulter votre boîte de réception.
    </p>
</div>

<div class="mt-8">
    <a href="{% url 'account_login' %}" class="btn-secondary">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Retour à la connexion</span>
    </a>
</div>
{% endblock %}
