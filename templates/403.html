<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Accès refusé — KAYDAN</title>
  <style>
    :root { --nuit:#0f172a; --orange:#e2571e; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
           font-family:"Helvetica Neue",Arial,sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b); color:#e2e8f0; padding:24px; }
    .card { max-width:520px; width:100%; background:rgba(255,255,255,.06); backdrop-filter:blur(8px);
            border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:36px 32px; text-align:center; }
    .brand { display:inline-flex; align-items:center; gap:10px; margin-bottom:18px; }
    .logo { width:38px; height:38px; border-radius:9px; background:var(--orange); color:#fff; font-weight:800;
            display:flex; align-items:center; justify-content:center; font-size:19px; }
    .code { font-size:56px; font-weight:800; color:var(--orange); line-height:1; }
    h1 { font-size:20px; margin:10px 0 6px; color:#fff; }
    p { color:#94a3b8; font-size:14px; line-height:1.5; margin:6px 0; }
    .path { font-family:monospace; font-size:12px; color:#cbd5e1; background:rgba(0,0,0,.25); padding:6px 10px; border-radius:8px; display:inline-block; margin-top:8px; word-break:break-all; }
    .actions { margin-top:24px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
    a.btn, button.btn { border:0; cursor:pointer; text-decoration:none; font-size:14px; font-weight:600; padding:10px 18px; border-radius:10px; }
    .btn-primary { background:var(--orange); color:#fff; }
    .btn-ghost { background:rgba(255,255,255,.1); color:#e2e8f0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand"><span class="logo">K</span><strong>parcelaireKG</strong></div>
    <div class="code">403</div>
    <h1>Accès refusé</h1>
    <p>Vous êtes authentifié mais vous n'avez pas la permission d'accéder à cette ressource.
       Contactez un administrateur si vous pensez que c'est une erreur.</p>
    <div class="actions">
      <button type="button" class="btn btn-ghost" onclick="history.back()">← Retour</button>
      <a href="/" class="btn btn-primary">Accueil</a>
    </div>
  </div>
</body>
</html>
