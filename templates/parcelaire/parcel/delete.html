{% extends "layouts/base.html" %}
{% load static %}

{% block content %}
<main class="mx-auto max-w-3xl px-4 py-10 lg:px-8">

    <section class="panel rounded-[36px] p-8 md:p-10 text-center">
        <div class="mx-auto grid h-24 w-24 place-items-center rounded-[28px] bg-gradient-to-br from-rose-500 to-red-600 text-white shadow-[0_20px_60px_rgba(244,63,94,0.25)]">
            <i class="fa-solid fa-trash text-3xl"></i>
        </div>

        <p class="mt-8 text-xs font-bold uppercase tracking-[0.28em] text-rose-500">Suppression</p>
        <h1 class="mt-3 text-3xl font-black tracking-tight text-slate-900 md:text-4xl">
            Supprimer cette parcelle ?
        </h1>
        <p class="mx-auto mt-4 max-w-2xl text-sm leading-7 text-slate-500 md:text-base">
            Vous êtes sur le point de supprimer la parcelle
            <span class="font-bold text-slate-900">« Lot {{ object.lot_number|default:object.parcel_code }} »</span>.
        </p>

        <form method="post" class="mt-8 flex flex-col gap-3 sm:flex-row sm:justify-center">
            {% csrf_token %}
            <a href="{% url 'parcel_detail' object.pk %}"
               class="inline-flex items-center justify-center gap-2 rounded-2xl bg-white px-5 py-3 text-sm font-bold text-slate-700 soft-ring">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Annuler</span>
            </a>

            <button type="submit"
                    class="inline-flex items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-rose-600 to-red-600 px-5 py-3 text-sm font-bold text-white shadow-lg">
                <i class="fa-solid fa-trash"></i>
                <span>Confirmer la suppression</span>
            </button>
        </form>
    </section>

</main>
{% endblock %}
