<div x-data="simulationGenerator()" class="rounded-3xl bg-white p-5 shadow-soft border border-slate-200">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-xs font-bold uppercase tracking-[0.22em] text-premium-600">IA Vidéo</p>
            <h3 class="mt-2 text-xl font-extrabold text-slate-900">Simulation de construction</h3>
        </div>
        <button
            @click="launch()"
            :disabled="loading"
            class="rounded-2xl bg-premium-500 px-4 py-3 text-sm font-bold text-white hover:bg-premium-600 disabled:opacity-50"
        >
            Générer la vidéo
        </button>
    </div>

    <div class="mt-4 grid grid-cols-2 gap-3">
        <div>
            <label class="text-xs font-bold text-slate-500">Provider</label>
            <select x-model="form.provider" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3">
                <option value="RUNWAY">Runway</option>
                <option value="VEO">Google Veo</option>
            </select>
        </div>

        <div>
            <label class="text-xs font-bold text-slate-500">Style</label>
            <select x-model="form.style" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3">
                <option value="REALISTIC">Réaliste</option>
                <option value="CINEMATIC">Cinématique</option>
                <option value="PREMIUM">Premium</option>
                <option value="DOCUMENTARY">Documentaire</option>
            </select>
        </div>

        <div>
            <label class="text-xs font-bold text-slate-500">Caméra</label>
            <select x-model="form.camera_style" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3">
                <option value="DRONE">Drone</option>
                <option value="STREET">Vue rue</option>
                <option value="MIXED">Mixte</option>
                <option value="ORBIT">Orbit</option>
                <option value="FIXED">Fixe</option>
            </select>
        </div>

        <div>
            <label class="text-xs font-bold text-slate-500">Durée</label>
            <select x-model="form.target_duration_seconds" class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3">
                <option value="15">15 sec</option>
                <option value="30">30 sec</option>
                <option value="45">45 sec</option>
                <option value="60">60 sec</option>
            </select>
        </div>
    </div>

    <div class="mt-4">
        <label class="text-xs font-bold text-slate-500">Prompt directeur</label>
        <textarea
            x-model="form.prompt_seed"
            rows="4"
            class="mt-1 w-full rounded-2xl border border-slate-200 px-4 py-3"
            placeholder="Décris le rendu souhaité..."
        ></textarea>
    </div>

    <div class="mt-4" x-show="simulation">
        <div class="flex items-center justify-between text-sm">
            <span class="font-semibold text-slate-600" x-text="simulation.status"></span>
            <span class="font-bold text-premium-600" x-text="`${simulation.progress_percent || 0}%`"></span>
        </div>
        <div class="mt-2 h-3 w-full rounded-full bg-slate-100 overflow-hidden">
            <div class="h-full bg-premium-500" :style="`width:${simulation.progress_percent || 0}%`"></div>
        </div>
    </div>

    <template x-if="simulation && simulation.final_video">
        <div class="mt-5">
            <video :src="simulation.final_video" controls class="w-full rounded-3xl"></video>
        </div>
    </template>
</div>

<script>
function simulationGenerator() {
    return {
        loading: false,
        polling: null,
        simulation: null,
        form: {
            asset: "{{ asset.id|default:'' }}",
            program: "{{ program.id|default:'' }}",
            provider: "RUNWAY",
            style: "REALISTIC",
            camera_style: "MIXED",
            target_duration_seconds: 30,
            aspect_ratio: "16:9",
            target_resolution: "1280x720",
            title: "Simulation IA chantier",
            prompt_seed: ""
        },

        async launch() {
            this.loading = true;
            try {
                const createResp = await fetch("/api/ai/construction-simulations/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": "{{ csrf_token }}"
                    },
                    body: JSON.stringify(this.form)
                });
                const created = await createResp.json();

                await fetch(`/api/ai/construction-simulations/${created.id}/generate/`, {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}"
                    }
                });

                this.simulation = created;
                this.startPolling(created.id);
            } catch (e) {
                console.error(e);
                alert("Erreur lors du lancement de la simulation.");
            } finally {
                this.loading = false;
            }
        },

        startPolling(id) {
            clearInterval(this.polling);
            this.polling = setInterval(async () => {
                const resp = await fetch(`/api/ai/construction-simulations/${id}/progress/`);
                const data = await resp.json();
                this.simulation = data;

                if (["COMPLETED", "FAILED", "CANCELED"].includes(data.status)) {
                    clearInterval(this.polling);
                }
            }, 5000);
        }
    }
}
</script>
