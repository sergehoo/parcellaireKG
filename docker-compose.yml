services:
  parcelaireweb:
    build: .
    container_name: parcelaireweb
    # Form YAML liste pour éviter toute imbrication de quotes ambiguë
    # (le `>` + `sh -c "…"` mangeait l'argument `--bind`, gunicorn
    # restait alors sur 127.0.0.1 et Traefik renvoyait Bad Gateway).
    # `exec gunicorn` remplace le shell par gunicorn → PID 1 dans le
    # container (meilleure gestion de SIGTERM, log gunicorn direct).
    command:
      - sh
      - -c
      - |
        set -e
        python manage.py collectstatic --noinput
        # --workers gthread + --threads = workers asynchrones (l'I/O des
        #   gros uploads ne bloque pas le worker, qui peut continuer à
        #   accepter d'autres requêtes).
        # --timeout 600 = 10 min : un GeoTIFF de plusieurs Go transite
        #   sans être coupé. La tâche GDAL, elle, tourne dans Celery.
        # --limit-request-line 16384 et --limit-request-field_size 65536
        #   évitent les "Request Line too long" si l'URL ou des cookies
        #   sont gros.
        exec gunicorn parcelaireKG.wsgi:application \
            --bind 0.0.0.0:8000 \
            --worker-class gthread \
            --workers 3 \
            --threads 4 \
            --timeout 600 \
            --graceful-timeout 60 \
            --keep-alive 5 \
            --limit-request-line 16384 \
            --limit-request-field_size 65536 \
            --access-logfile - \
            --error-logfile -
    volumes:
      # NB : ce bind écrase /app par le code source de l'hôte.
      # En prod, considérer un compose dédié sans cette ligne pour
      # garantir que l'image (avec son CSS et ses statics buildés)
      # soit utilisée telle quelle.
      - .:/app
      - static_volume:/app/staticfiles
      - ./media:/app/media
    environment:
      # Production forcée : prod.py + DEBUG désactivé, indépendamment du .env
      # (corrige la faille où la prod tournait en réalité sur dev.py/DEBUG=True).
      - DJANGO_ENV=prod
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=parcelaireKG.settings
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
      - ORTHO_ROOT=/app/media/tiles_ortho

      # Base de données
      - DB_ENGINE=django.contrib.gis.db.backends.postgis
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=parcelairedb
      - DB_PORT=5432

      # Redis / Celery
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

      # API CRM externe
      - EXTERNAL_LOTS_API_URL=${EXTERNAL_LOTS_API_URL}
      - EXTERNAL_LOTS_API_KEY=${EXTERNAL_LOTS_API_KEY}
      - EXTERNAL_LOTS_API_USERNAME=${EXTERNAL_LOTS_API_USERNAME}
      - EXTERNAL_LOTS_API_PASSWORD=${EXTERNAL_LOTS_API_PASSWORD}

      # MinIO / S3 — stockage objet pour les TIFF source
      # Hostname interne = nom du service Docker (Docker DNS) ;
      # hostname externe = sous-domaine Traefik configurable via .env.
      - S3_ENDPOINT_URL=http://parcelaire-orthos3:9000
      - S3_ENDPOINT_URL_EXTERNAL=https://${MINIO_S3_HOST:-s3-parcelaire.${DOMAIN}}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${MINIO_BUCKET:-parcelaire-orthophotos}
      - S3_REGION=us-east-1

      # Django
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - SITE_ID=${SITE_ID:-1}
      - TIME_ZONE=${TIME_ZONE:-Africa/Abidjan}
    env_file:
      - .env
    depends_on:
      - parcelairedb
      - redis
    networks:
      - proxy
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # Router HTTPS principal
      - "traefik.http.routers.parcelaire.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.parcelaire.entrypoints=websecure"
      - "traefik.http.routers.parcelaire.tls.certresolver=lets"

      # Service interne gunicorn
      - "traefik.http.services.parcelaire.loadbalancer.server.port=8000"

      # Middlewares
      - "traefik.http.middlewares.parcelaire-compress.compress=true"
      - "traefik.http.middlewares.parcelaire-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.parcelaire-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.parcelaire-sec.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.parcelaire-sec.headers.frameDeny=true"
      - "traefik.http.middlewares.parcelaire-sec.headers.contentTypeNosniff=true"

      # ATTENTION : NE PAS ajouter de middleware `buffering` ici.
      # Par défaut Traefik stream le body directement vers Gunicorn
      # (= comportement souhaité pour les gros uploads orthophoto).
      # Le middleware `buffering` tente de tout charger en mémoire/disque
      # tampon AVANT de relayer, ce qui casse les uploads >100 Mo
      # (timeout interne, /tmp saturé, etc.) → 500/502 sans même que
      # Gunicorn voie passer la requête.

      - "traefik.http.routers.parcelaire.middlewares=parcelaire-compress,parcelaire-sec"

    restart: unless-stopped

  parcelairecelery:
    build: .
    container_name: parcelairecelery
    command: celery -A parcelaire.celery:app worker -l info
    volumes:
      - .:/app
      # IMPORTANT : même bind-mount que parcelaireweb pour que les tuiles
      # générées par Celery (/app/media/tiles_ortho/…) soient visibles
      # par le serveur web qui les sert via WhiteNoise.
      - ./media:/app/media
      - static_volume:/app/staticfiles
    environment:
      # Production forcée : prod.py + DEBUG désactivé, indépendamment du .env
      # (corrige la faille où la prod tournait en réalité sur dev.py/DEBUG=True).
      - DJANGO_ENV=prod
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=parcelaireKG.settings
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
      - ORTHO_ROOT=/app/media/tiles_ortho
      # Base de données
      - DB_ENGINE=django.contrib.gis.db.backends.postgis
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=parcelairedb
      - DB_PORT=5432

      # Redis / Celery
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

      # API CRM externe
      - EXTERNAL_LOTS_API_URL=${EXTERNAL_LOTS_API_URL}
      - EXTERNAL_LOTS_API_KEY=${EXTERNAL_LOTS_API_KEY}
      - EXTERNAL_LOTS_API_USERNAME=${EXTERNAL_LOTS_API_USERNAME}
      - EXTERNAL_LOTS_API_PASSWORD=${EXTERNAL_LOTS_API_PASSWORD}

      # MinIO / S3 — stockage objet pour les TIFF source
      # Hostname interne = nom du service Docker (Docker DNS) ;
      # hostname externe = sous-domaine Traefik configurable via .env.
      - S3_ENDPOINT_URL=http://parcelaire-orthos3:9000
      - S3_ENDPOINT_URL_EXTERNAL=https://${MINIO_S3_HOST:-s3-parcelaire.${DOMAIN}}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${MINIO_BUCKET:-parcelaire-orthophotos}
      - S3_REGION=us-east-1

      - SECRET_KEY=${SECRET_KEY}
      - TIME_ZONE=${TIME_ZONE:-Africa/Abidjan}
    env_file:
      - .env
    depends_on:
      - parcelairedb
      - redis
    networks:
      - default
    restart: unless-stopped

  parcelairebeat:
    build: .
    container_name: parcelairebeat
    command: celery -A parcelaire.celery:app beat -l info
    volumes:
      - .:/app
      # Idem parcelairecelery : on partage le même bind-mount media.
      - ./media:/app/media
      - static_volume:/app/staticfiles

    environment:
      # Production forcée : prod.py + DEBUG désactivé, indépendamment du .env
      # (corrige la faille où la prod tournait en réalité sur dev.py/DEBUG=True).
      - DJANGO_ENV=prod
      - DEBUG=False
      - DJANGO_SETTINGS_MODULE=parcelaireKG.settings
      - STATIC_ROOT=/app/staticfiles
      - MEDIA_ROOT=/app/media
      - ORTHO_ROOT=/app/media/tiles_ortho

      # Base de données
      - DB_ENGINE=django.contrib.gis.db.backends.postgis
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=parcelairedb
      - DB_PORT=5432

      # Redis / Celery
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

      # API CRM externe
      - EXTERNAL_LOTS_API_URL=${EXTERNAL_LOTS_API_URL}
      - EXTERNAL_LOTS_API_KEY=${EXTERNAL_LOTS_API_KEY}
      - EXTERNAL_LOTS_API_USERNAME=${EXTERNAL_LOTS_API_USERNAME}
      - EXTERNAL_LOTS_API_PASSWORD=${EXTERNAL_LOTS_API_PASSWORD}

      # MinIO / S3 — stockage objet pour les TIFF source
      # Hostname interne = nom du service Docker (Docker DNS) ;
      # hostname externe = sous-domaine Traefik configurable via .env.
      - S3_ENDPOINT_URL=http://parcelaire-orthos3:9000
      - S3_ENDPOINT_URL_EXTERNAL=https://${MINIO_S3_HOST:-s3-parcelaire.${DOMAIN}}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - S3_BUCKET=${MINIO_BUCKET:-parcelaire-orthophotos}
      - S3_REGION=us-east-1

      - SECRET_KEY=${SECRET_KEY}
      - TIME_ZONE=${TIME_ZONE:-Africa/Abidjan}
    env_file:
      - .env
    depends_on:
      - parcelairedb
      - redis
    networks:
      - default
    restart: unless-stopped

  parcelairedb:
    image: postgis/postgis:15-3.4
    container_name: parcelairedb
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=${TIME_ZONE:-Africa/Abidjan}
      - PGTZ=${TIME_ZONE:-Africa/Abidjan}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"
    networks:
      - default
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: parcelaire-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - default
    restart: unless-stopped
  parcelaireadminer:
    image: adminer:4
    container_name: parcelaire-adminer
    restart: unless-stopped
    depends_on:
      - parcelairedb
    ports:
      - "8081:8080"
    environment:
      - ADMINER_DEFAULT_SERVER=parcelairedb
    networks:
      - default
      - proxy
    # Traefik désactivé tant qu'on n'a pas terminé l'investigation
    # Let's Encrypt (rate-limit ACME bloque le domaine adminer). On
    # accède toujours à adminer via http://<host>:8081 en direct.
    labels:
      - "traefik.enable=false"

  # =================================================================
  # MinIO dédié au parcellaire — stockage S3-compatible des orthophotos.
  # Tous les noms (service / container / volume / routes Traefik) sont
  # préfixés `parcelaire-orthos3` pour ne pas entrer en conflit avec une
  # autre instance MinIO déjà présente sur l'hôte.
  # Les sous-domaines publics sont configurables via `.env` :
  #   MINIO_S3_HOST       (default s3-parcelaire.${DOMAIN})
  #   MINIO_CONSOLE_HOST  (default minio-parcelaire.${DOMAIN})
  # =================================================================
  parcelaire-orthos3:
    image: minio/minio:latest
    container_name: parcelaire-orthos3
    hostname: parcelaire-orthos3
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # URLs publiques utilisées pour les redirections de la console et
      # l'affichage de l'API S3 dans l'UI.
      MINIO_BROWSER_REDIRECT_URL: https://${MINIO_CONSOLE_HOST:-minio-parcelaire.${DOMAIN}}
      MINIO_SERVER_URL: https://${MINIO_S3_HOST:-s3-parcelaire.${DOMAIN}}
    volumes:
      - parcelaire_orthos3_data:/data
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      # ----- Router 1 : API S3 (presigned PUT, GET) -----
      - "traefik.http.routers.parcelaire-orthos3-api.rule=Host(`${MINIO_S3_HOST:-s3-parcelaire.${DOMAIN}}`)"
      - "traefik.http.routers.parcelaire-orthos3-api.entrypoints=websecure"
      - "traefik.http.routers.parcelaire-orthos3-api.tls.certresolver=lets"
      - "traefik.http.routers.parcelaire-orthos3-api.service=parcelaire-orthos3-api"
      - "traefik.http.services.parcelaire-orthos3-api.loadbalancer.server.port=9000"

      # ----- Router 2 : Console MinIO (UI admin) -----
      - "traefik.http.routers.parcelaire-orthos3-ui.rule=Host(`${MINIO_CONSOLE_HOST:-minio-parcelaire.${DOMAIN}}`)"
      - "traefik.http.routers.parcelaire-orthos3-ui.entrypoints=websecure"
      - "traefik.http.routers.parcelaire-orthos3-ui.tls.certresolver=lets"
      - "traefik.http.routers.parcelaire-orthos3-ui.service=parcelaire-orthos3-ui"
      - "traefik.http.services.parcelaire-orthos3-ui.loadbalancer.server.port=9001"

  # Bootstrap : crée le bucket et configure la policy au premier démarrage.
  parcelaire-orthos3-init:
    image: minio/mc:latest
    container_name: parcelaire-orthos3-init
    depends_on:
      - parcelaire-orthos3
    networks:
      - default
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-parcelaire-orthophotos}
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set parc http://parcelaire-orthos3:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing parc/$$MINIO_BUCKET;
      mc anonymous set none parc/$$MINIO_BUCKET || true;
      echo 'MinIO bucket prêt (privé) : '$$MINIO_BUCKET;
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
  parcelaire_orthos3_data:

networks:
  proxy:
    external: true